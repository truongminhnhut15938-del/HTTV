<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
        <meta name="viewport"
                  content="width=device-width, initial-scale=1.0">

                      <title>HTTV - Hệ Thống Tri Thức Văn Bản</title>

                          <link rel="stylesheet" href="css/style.css">
                          </head>

                          <body>

                          <header>

                          <h1>📚 HTTV</h1>

                          <p>Hệ Thống Tri Thức Văn Bản</p>

                          </header>

                          <main>

                          <section class="search-box">

                          <input
                          type="text"
                          id="searchInput"
                          placeholder="Nhập từ khóa hoặc câu hỏi...">

                          <button id="searchBtn">

                          🔍 Tra cứu

                          </button>

                          </section>

                          <section class="menu">

                          <button id="btnUpload">

                          📂 Thêm tài liệu

                          </button>
                          <input
                        type="file"
                        id="fileInput"
                        accept=".pdf,.doc,.docx,.xls,.xlsx,.txt"
                        style="display:none">
                              
                          <button id="btnDocuments">

                          📄 Danh sách tài liệu

                          </button>

                          <button id="btnKnowledge">

                          🧠 Kho tri thức

                          </button>

                          <button id="btnSettings">

                          ⚙️ Cài đặt

                          </button>

                          </section>

                          <section id="content">

                          <h2>Chào mừng đến với HTTV</h2>

                          <p>

                          Hệ thống sẽ giúp bạn quản lý, phân tích và tra cứu các văn bản pháp luật.

                          </p>

                          </section>

                          </main>

                          <footer>

                          <p>

                          HTTV v0.1.0 Alpha

                          </p>

                          </footer>

                          <script src="js/config.js"></script>

                          <script src="js/ui.js"></script>

                          <script src="js/app.js"></script>

                          </body>

                          </html>
